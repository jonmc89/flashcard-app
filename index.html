<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <title>Frontend Mentor | Flashcard app</title>
    </head>
    <body>
        <header>
            <img
                class="logo-small"
                src="./assets/images/logo-small.svg"
                alt="logo small"
            />
            <img
                class="logo-large"
                src="./assets/images/logo-large.svg"
                alt="logo large"
            />
            <div class="header-selector-container">
                <div class="study-mode-selector">
                    <p>Study Mode</p>
                </div>
                <div class="all-cards-selector">
                    <p>All Cards</p>
                </div>
            </div>
        </header>
        <main>
            <section class="main-section">
                <div class="selection-container">
                    <div class="selections">
                        <div class="catergories">
                            <div class="catergories-text">
                                <p>All Catergories</p>
                                <img
                                    class="catergories-drop-down-icon"
                                    src="./assets/images/icon-chevron-down.svg"
                                    alt=""
                                />
                            </div>
                            <div class="hide-mastered-container">
                                <input
                                    id="hide-mastered"
                                    name="hide-mastered"
                                    type="checkbox"
                                />
                                <label for="hide-mastered">Hide Mastered</label>
                            </div>
                        </div>
                        <div class="shuffle">
                            <img
                                class="shuffle-icon"
                                src="./assets/images/icon-shuffle.svg"
                                alt=""
                            />
                            <p>Shuffle</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
