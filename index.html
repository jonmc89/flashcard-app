<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <title>Frontend Mentor | Flashcard app</title>
    </head>
    <body>
        <header>
            <img
                class="logo-small"
                src="./assets/images/logo-small.svg"
                alt="logo small"
            />
            <img
                class="logo-large"
                src="./assets/images/logo-large.svg"
                alt="logo large"
            />
            <div class="header-selector-container">
                <div class="study-mode-selector">
                    <p>Study Mode</p>
                </div>
                <div class="all-cards-selector">
                    <p>All Cards</p>
                </div>
            </div>
        </header>
        <main>
            <section class="main-section">
                <div class="selection-container">
                    <div class="selections">
                        <div class="catergories">
                            <div class="catergories-text">
                                <p>All Catergories</p>
                                <img
                                    class="catergories-drop-down-icon"
                                    src="./assets/images/icon-chevron-down.svg"
                                    alt=""
                                />
                            </div>
                            <div class="hide-mastered-container">
                                <input
                                    id="hide-mastered"
                                    name="hide-mastered"
                                    type="checkbox"
                                />
                                <label for="hide-mastered">Hide Mastered</label>
                            </div>
                        </div>
                        <div class="shuffle">
                            <img
                                class="shuffle-icon"
                                src="./assets/images/icon-shuffle.svg"
                                alt=""
                            />
                            <p>Shuffle</p>
                        </div>
                    </div>
                </div>
                <div class="cards-section">
                    <div class="current-card">
                        <img
                            class="blue-star"
                            src="./assets/images/pattern-star-blue.svg"
                            alt=""
                        />
                        <img
                            class="yellow-star"
                            src="./assets/images/pattern-star-yellow.svg"
                            alt=""
                        />
                        <div class="current-card-subject">
                            <p>Web Development</p>
                        </div>
                        <div class="current-card-content">
                            <p class="current-card-question">
                                What does HTML stand for?
                            </p>
                            <p class="current-card-reveal">
                                Click to reveal answer
                            </p>
                        </div>
                        <div class="current-card-progress">
                            <div class="card-progress">
                                <div class="progress-bar"></div>
                                <p>0/5</p>
                            </div>
                        </div>
                    </div>
                    <div class="cards-btns-container">
                        <button class="i-know-this-btn" type="button">
                            <img
                                src="./assets/images/icon-circle-check.svg"
                                alt=""
                            />
                            I Know This
                        </button>
                        <button class="reset-progress-btn" type="button">
                            <img
                                src="./assets/images/icon-reset.svg"
                                alt=""
                            />Reset Progress
                        </button>
                    </div>
                </div>
                <div class="next-card-container">
                    <div class="previous-card">
                        <img
                            src="./assets/images/icon-chevron-left.svg"
                            alt=""
                        />
                        <p>Previous</p>
                    </div>
                    <p>Card 1 of 40</p>
                    <div class="next-card">
                        <p>Next</p>
                        <img
                            src="./assets/images/icon-chevron-right.svg"
                            alt=""
                        />
                    </div>
                </div>
            </section>
            <section class="stats-section">
                <h1>Study Statistics</h1>
                <div class="stats-card-container">
                    <div class="stat-card">
                        <div class="stat-text">
                            <h2>Total cards</h2>
                            <p class="stats-total-number">40</p>
                        </div>
                        <div class="stat-symbol-container">
                            <img
                                src="./assets/images/icon-stats-total.svg"
                                alt=""
                            />
                        </div>
                        <div class="stat-symbol-blue"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-text">
                            <h2>Mastered</h2>
                            <p class="stats-total-number">11</p>
                        </div>
                        <div class="stat-symbol-container">
                            <img
                                src="./assets/images/icon-stats-mastered.svg"
                                alt=""
                            />
                        </div>
                        <div class="stat-symbol-green"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-text">
                            <h2>In Progress</h2>
                            <p class="stats-total-number">21</p>
                        </div>
                        <div class="stat-symbol-container">
                            <img
                                src="./assets/images/icon-stats-in-progress.svg"
                                alt=""
                            />
                        </div>
                        <div class="stat-symbol-red"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-text">
                            <h2>TNot Started</h2>
                            <p class="stats-total-number">40</p>
                        </div>
                        <div class="stat-symbol-container">
                            <img
                                src="./assets/images/icon-stats-not-started.svg"
                                alt=""
                            />
                        </div>
                        <div class="stat-symbol-pink"></div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
